<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIAS Detailing – Hodnocení</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #050505, #0a0a0a);
    color: #fff;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(0,255,136,0.2);
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.label {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}

/* BUTTON SELECT */
.select-buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.select-buttons button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.select-buttons button.active {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 15px #00ff88;
}

/* STAR RATING */
.stars {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.stars span {
    font-size: 28px;
    cursor: pointer;
    opacity: 0.4;
    transition: 0.2s;
}

.stars span.active {
    opacity: 1;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
}

/* CONTACT BUTTONS */
.contact-buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.contact-buttons button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
}

.contact-buttons button.active {
    background: #00ff88;
    color: black;
}

/* SUBMIT */
.submit {
    width: 100%;
    padding: 15px;
    margin-top: 25px;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.submit:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px #00ff88;
}

.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    opacity: 0.7;
}

.footer a {
    color: #00ff88;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
<h1>Jak jsi byl spokojen?</h1>

<form action="https://formsubmit.co/tvuj@email.cz" method="POST" onsubmit="prepare()">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="CIAS – Nové hodnocení">

<!-- SLUŽBA -->
<div class="label">Co jsme dělali?</div>
<div class="select-buttons" id="service">
<button type="button">Detailing</button>
<button type="button">Servis</button>
<button type="button">Obojí</button>
</div>
<input type="hidden" name="Sluzba" id="serviceValue">

<!-- HODNOCENÍ -->
<div class="label">Hodnocení</div>
<div class="stars" id="stars">
<span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
</div>
<input type="hidden" name="Hodnoceni" id="ratingValue">

<!-- DOPORUČENÍ -->
<div class="label">Doporučil bys nás?</div>
<div class="select-buttons" id="recommend">
<button type="button">ANO</button>
<button type="button">SPÍŠ ANO</button>
<button type="button">NE</button>
</div>
<input type="hidden" name="Doporuceni" id="recommendValue">

<!-- KONTAKT -->
<div class="label">Jak tě můžeme kontaktovat?</div>
<div class="contact-buttons" id="contact">
<button type="button">Telefon</button>
<button type="button">Instagram</button>
<button type="button">Email</button>
</div>
<input type="hidden" name="Kontakt_typ" id="contactType">

<input type="text" name="Kontakt" placeholder="Zadej kontakt" required>

<button class="submit" type="submit">Odeslat hodnocení</button>

</form>

<div class="footer">
CIAS Detailing<br>
Kontakt: 777 123 456<br>
Web: <a href="#">www.ciasdetailing.cz</a>
</div>

</div>

<script>
// BUTTON SELECT
function setupButtons(id, output) {
    const buttons = document.querySelectorAll(`#${id} button`);
    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            buttons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById(output).value = btn.innerText;
        });
    });
}

setupButtons("service", "serviceValue");
setupButtons("recommend", "recommendValue");
setupButtons("contact", "contactType");

// STARS
const stars = document.querySelectorAll("#stars span");
stars.forEach((star, index) => {
    star.addEventListener("click", () => {
        stars.forEach((s, i) => {
            s.classList.toggle("active", i <= index);
        });
        document.getElementById("ratingValue").value = index + 1;
    });
});

// VALIDACE
function prepare() {
    if (!document.getElementById("ratingValue").value) {
        alert("Klikni na hodnocení ⭐");
        return false;
    }
}
</script>

</body>
</html>
